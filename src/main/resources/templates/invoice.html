<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 20px;
        }

        .invoice {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 35px 50px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.8px;
        }

        .header p {
            margin: 8px 0 0;
            font-size: 1.15rem;
            opacity: 0.95;
        }

        .content {
            padding: 40px 50px;
        }

        .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 35px;
        }

        .box {
            background: #f8fafc;
            border-radius: 12px;
            padding: 22px;
        }

        .box h3 {
            margin: 0 0 15px 0;
            color: #1e40af;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .box p {
            margin: 10px 0;
            font-size: 1.02rem;
            line-height: 1.55;
        }

        .label {
            font-weight: 500;
            color: #64748b;
            font-size: 0.92rem;
        }

        .value {
            font-weight: 600;
            color: #0f172a;
        }

        .description-box {
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .total {
            text-align: right;
            font-size: 1.45rem;
            font-weight: 700;
            color: #1e40af;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        @media print {
            body { background: white; padding: 0; }
            .invoice { box-shadow: none; border-radius: 0; }
        }
    </style>
</head>
<body>
<div class="invoice">
    <!-- Header -->
    <div class="header">
        <h1>INVOICE</h1>
        <p>Service Fee</p>
    </div>

    <!-- Content -->
    <div class="content">
        <div class="info">
            <!-- Customer -->
            <div class="box">
                <h3>Customer</h3>
                <p>
                    <span class="label">Name Surname:</span><br>
                    <span class="value" th:text="${customerName}"></span>
                </p>
                <br>
                <span class="label">Signature:</span><br>
            </div>

            <!-- Dates -->
            <div class="box">
                <h3>Date Information</h3>
                <p>
                    <span class="label">Invoice Date:</span><br>
                    <span class="value" th:text="${billingDate}"></span>
                </p>
                <p>
                    <span class="label">Payment Date:</span><br>
                    <span class="value" th:text="${paymentDate}"></span>
                </p>
                <p>
                    <span class="label">Appointment Date:</span><br>
                    <span class="value" th:text="${appointmentDate}"></span>
                </p>
            </div>
        </div>

        <!-- Appointment Description -->
        <div class="description-box">
            <h3>Appointment Description</h3>
            <p style="font-size: 1.05rem; line-height: 1.7; margin: 0;"
               th:text="${appointmentDescription}">
            </p>
        </div>

        <!-- Total -->
        <div class="total">
            Total Amount: ₺<span style="color: #ef4444;" th:text="${amount}"></span>
        </div>
    </div>
</div>
</body>
</html>
